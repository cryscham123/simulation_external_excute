- hosts: "Name_serverNode"
  gather_facts: false
  become: true
  
  vars:
    env_files: "{{ lookup('fileglob', '../envs/.env.*', wantlist=True) | sort }}"

  tasks:
    - name: Create app directory
      file:
        path: "/home/ubuntu/app"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Clone GitHub repository
      git:
        repo: 'https://github.com/cryscham123/simulation_teamwork.git'
        dest: '/home/ubuntu/app'
        version: psh
        force: yes
      become_user: ubuntu

    - name: Install OS runtime dependencies
      apt:
        name:
          - curl
          - jq
        state: present
        update_cache: true

    - name: Install Python dependencies from requirements.txt
      pip:
        requirements: "/home/ubuntu/app/requirements.txt"

    - name: Install notebook runtime dependencies
      pip:
        name:
          - jupyter
          - "scipy>=1.7.0"


    - name: Copy specific env file to remote instance as .env
      copy:
        src: "{{ env_files[ansible_play_hosts.index(inventory_hostname)] }}"
        dest: "/home/ubuntu/app/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Extract BASE_DATA_PATH from remote .env
      shell: |
        grep '^BASE_DATA_PATH=' /home/ubuntu/app/.env | cut -d'=' -f2
      register: base_data_path_raw
      changed_when: false

    - name: Set BASE_DATA_PATH fact
      set_fact:
        base_data_path: "{{ base_data_path_raw.stdout | trim }}"

    - name: Create BASE_DATA_PATH directory
      file:
        path: "/home/ubuntu/app/{{ base_data_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy simulation data files to remote
      copy:
        src: "data/"
        dest: "/home/ubuntu/app/{{ base_data_path }}/"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create simulation runtime directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /var/log/simulation
        - /var/lib/simulation

    - name: Create simulation secret directory
      file:
        path: /etc/simulation
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Write Google Drive upload credentials
      copy:
        dest: /etc/simulation/drive.env
        owner: root
        group: root
        mode: '0600'
        content: |
          DRIVE_CLIENT_ID={{ vault_drive_client_id | quote }}
          DRIVE_CLIENT_SECRET={{ vault_drive_client_secret | quote }}
          DRIVE_REFRESH_TOKEN={{ vault_drive_refresh_token | quote }}
          DRIVE_FOLDER_ID={{ vault_google_drive_folder_id | quote }}
      no_log: true

    - name: Write simulation runner script
      copy:
        dest: /home/ubuntu/app/run_simulation.sh
        owner: root
        group: root
        mode: '0750'
        content: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          APP_DIR="/home/ubuntu/app"
          RESULT_FILE="${APP_DIR}/tuning/composite_rule_result.json"
          NOTEBOOK="${APP_DIR}/tuning/composite_rule.ipynb"
          OUTPUT_NOTEBOOK="${APP_DIR}/result_executed.ipynb"
          STATUS_DIR="/var/lib/simulation"
          JUPYTER_BIN="/home/ubuntu/.local/bin/jupyter"

          mkdir -p "${STATUS_DIR}"
          echo "running" > "${STATUS_DIR}/status"
          date -Is > "${STATUS_DIR}/started_at"
          rm -f "${STATUS_DIR}/finished_at"

          finish() {
            exit_code=$?

            if [ "${exit_code}" -eq 0 ]; then
              echo "succeeded" > "${STATUS_DIR}/status"
            else
              echo "failed:${exit_code}" > "${STATUS_DIR}/status"
            fi

            date -Is > "${STATUS_DIR}/finished_at"
            sync || true

            if [ "${SIMULATION_AUTO_STOP:-1}" = "1" ]; then
              echo "Simulation finished with exit code ${exit_code}. Stopping this EC2 instance."
              /sbin/shutdown -h now || true
            fi

            exit "${exit_code}"
          }
          trap finish EXIT

          source /etc/simulation/drive.env

          cd "${APP_DIR}"

          if [ ! -x "${JUPYTER_BIN}" ]; then
            JUPYTER_BIN="$(command -v jupyter)"
          fi

          echo "Starting notebook execution at $(date -Is)"
          rm -f -- "${RESULT_FILE}" "${OUTPUT_NOTEBOOK}"
          sudo -H -u ubuntu "${JUPYTER_BIN}" nbconvert \
            --to notebook \
            --execute "${NOTEBOOK}" \
            --output "${OUTPUT_NOTEBOOK}" \
            --ExecutePreprocessor.timeout=-1

          echo "Notebook execution finished at $(date -Is)"
          echo "Requesting Google Drive access token."
          ACCESS_TOKEN="$(curl -fsS -X POST "https://oauth2.googleapis.com/token" \
            --data-urlencode "client_id=${DRIVE_CLIENT_ID}" \
            --data-urlencode "client_secret=${DRIVE_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${DRIVE_REFRESH_TOKEN}" \
            --data-urlencode "grant_type=refresh_token" | jq -r '.access_token')"

          if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
            echo "Failed to get Google Drive access token." >&2
            exit 1
          fi

          RESULT_FILES=("${OUTPUT_NOTEBOOK}" "${RESULT_FILE}")

          for FILEPATH in "${RESULT_FILES[@]}"; do
            if [ ! -f "${FILEPATH}" ]; then
              echo "Expected result file ${FILEPATH} does not exist." >&2
              exit 1
            fi
          done

          UPLOAD_INDEX=1

          for FILEPATH in "${RESULT_FILES[@]}"; do
            FILENAME="$(basename "${FILEPATH}")"
            EXTENSION=""
            if [[ "${FILENAME}" == *.* ]]; then
              EXTENSION=".${FILENAME##*.}"
            fi
            UPLOAD_NAME="결과파일${UPLOAD_INDEX}${EXTENSION}"

            case "${FILENAME}" in
              *.csv) CONTENT_TYPE="text/csv" ;;
              *.html) CONTENT_TYPE="text/html" ;;
              *.json) CONTENT_TYPE="application/json" ;;
              *.ipynb) CONTENT_TYPE="application/x-ipynb+json" ;;
              *) CONTENT_TYPE="application/octet-stream" ;;
            esac

            METADATA="$(jq -n \
              --arg name "${UPLOAD_NAME}" \
              --arg parent "${DRIVE_FOLDER_ID}" \
              '{name: $name, parents: [$parent]}')"

            echo "Uploading ${FILENAME} to Google Drive as ${UPLOAD_NAME}."
            curl -fsS -X POST "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -F "metadata=${METADATA};type=application/json;charset=UTF-8" \
              -F "file=@${FILEPATH};type=${CONTENT_TYPE}"
            echo
            rm -f -- "${FILEPATH}"
            echo "Deleted local uploaded file ${FILEPATH}."
            UPLOAD_INDEX=$((UPLOAD_INDEX + 1))
          done

          echo "Simulation workflow completed at $(date -Is)"

    - name: Write simulation systemd service
      copy:
        dest: /etc/systemd/system/simulation.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Simulation notebook runner
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/home/ubuntu/app
          Environment=SIMULATION_AUTO_STOP=1
          ExecStart=/home/ubuntu/app/run_simulation.sh
          Restart=no
          TimeoutStartSec=infinity
          StandardOutput=append:/var/log/simulation/simulation.log
          StandardError=append:/var/log/simulation/simulation.log

          [Install]
          WantedBy=multi-user.target

    - name: Reset failed simulation service state
      command: systemctl reset-failed simulation.service
      changed_when: false
      failed_when: false

    - name: Start simulation service
      systemd:
        name: simulation.service
        daemon_reload: true
        enabled: false
        state: started
